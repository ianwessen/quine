    <pre id="source"><code class="language-html"></code></pre>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <script>
      fetch(location.href)
        .then((r) => r.text())
        .then((text) => {
          const code = document.querySelector("#source code");
          code.textContent = text;
          Prism.highlightElement(code);

          code.querySelectorAll(".token.comment").forEach((el) => {
            el.innerHTML = el.innerHTML
              .replace(/(?<!["\w])([\w.]+\.com\/[\w\-\/]+)/g, '<a href="https://$1">$1</a>')
              .replace(/(?<!["\w])([\w.]+\.io\/[\w\-\/]+)/g,  '<a href="https://$1">$1</a>')
              .replace(/\b([\w.]+@[\w.]+\.com)\b/g, '<a href="mailto:$1">$1</a>');
          });
        });
    </script>
